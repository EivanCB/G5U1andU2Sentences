<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer Travel Game</title>
    <style>
        :root {
            --p1-color: #ff4757;
            --p2-color: #2ed573;
            --card-blue: #2e86de;
        }

        body {
            font-family: 'Arial Rounded MT Bold', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #f8b500 100%);
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #ui-layer { text-align: center; padding: 10px; width: 100%; z-index: 10; }
        .btn-group { margin: 10px; }
        button {
            padding: 10px 20px; font-size: 18px; cursor: pointer; border-radius: 8px;
            border: none; background: white; font-weight: bold; box-shadow: 0 4px #ccc; margin: 0 5px;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px #ccc; }

        #turn-info {
            font-size: 24px; background: rgba(255,255,255,0.8);
            padding: 5px 20px; border-radius: 20px; display: inline-block; margin-top: 5px;
            transition: all 0.3s ease;
        }

        .game-area {
            display: flex; width: 100%; flex-grow: 1; justify-content: space-around;
            align-items: center; padding: 20px; box-sizing: border-box;
        }

        /* Scoring Area & Active Glow */
        .score-zone {
            width: 140px; height: 85%; background: rgba(255,255,255,0.2);
            border-radius: 20px; display: flex; flex-direction: column-reverse;
            align-items: center; padding: 15px; gap: 10px; border: 5px solid rgba(255,255,255,0.5);
            transition: all 0.5s ease;
            opacity: 0.5; /* Dim inactive players */
        }

        /* Pulsing Glow for Active Player */
        @keyframes pulse-p1 {
            0% { box-shadow: 0 0 20px var(--p1-color); border-color: var(--p1-color); }
            50% { box-shadow: 0 0 50px var(--p1-color); border-color: #fff; }
            100% { box-shadow: 0 0 20px var(--p1-color); border-color: var(--p1-color); }
        }
        @keyframes pulse-p2 {
            0% { box-shadow: 0 0 20px var(--p2-color); border-color: var(--p2-color); }
            50% { box-shadow: 0 0 50px var(--p2-color); border-color: #fff; }
            100% { box-shadow: 0 0 20px var(--p2-color); border-color: var(--p2-color); }
        }

        .active-p1 { animation: pulse-p1 2s infinite; opacity: 1; background: rgba(255, 255, 255, 0.4); }
        .active-p2 { animation: pulse-p2 2s infinite; opacity: 1; background: rgba(255, 255, 255, 0.4); }

        .heart-score { font-size: 65px; transition: all 0.3s; line-height: 1; }

        .grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, 1fr); gap: 15px; width: 65%; height: 85%;
        }

        .card { perspective: 1000px; cursor: pointer; }
        .card-inner {
            position: relative; width: 100%; height: 100%; transition: transform 0.6s;
            transform-style: preserve-3d; border-radius: 15px; box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center; padding: 15px;
            box-sizing: border-box; border-radius: 15px; border: 4px solid white; text-align: center;
        }
        .card-front { background-color: var(--card-blue); color: white; font-size: 26px; }
        .card-back { background-color: white; transform: rotateY(180deg); font-size: 90px; }

        /* End Screen & Editor */
        #end-screen, #editor {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center;
            align-items: center; flex-direction: column; color: white; text-align: center;
        }
        #end-screen h2 { font-size: 60px; margin-bottom: 20px; }
        #editor { background: white; color: black; padding: 30px; box-sizing: border-box; }
        textarea { width: 100%; height: 70%; font-size: 18px; margin-bottom: 20px; }

        /* Effects */
        @keyframes explode { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(2); } 100% { transform: scale(0); opacity: 0; } }
        .exploding { animation: explode 0.5s forwards; }
        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } }
        .shaking { animation: shake 0.1s infinite; }
        .flying-item { position: fixed; font-size: 70px; z-index: 1000; transition: all 0.8s ease-in-out; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui-layer">
    <h1>☀️ Summer Travel Game 🚢</h1>
    <div class="btn-group">
        <button onclick="togglePause()" id="pauseBtn">Pause</button>
        <button onclick="resetGame()">Restart</button>
        <button onclick="openEditor()">Edit Cards</button>
    </div>
    <div id="turn-info">Player 1's Turn</div>
</div>

<div class="game-area">
    <div id="p1-zone" class="score-zone active-p1"></div>
    <div class="grid" id="grid"></div>
    <div id="p2-zone" class="score-zone"></div>
</div>

<div id="end-screen">
    <h2 id="winner-msg"></h2>
    <button onclick="resetGame()" style="font-size: 30px; padding: 20px 40px;">Play Again</button>
</div>

<div id="editor">
    <h2>Edit Card Text (Exactly 20 lines)</h2>
    <textarea id="edit-area"></textarea>
    <br>
    <button onclick="saveEditor()" style="background: #2ed573; color: white;">Save & Restart</button>
    <button onclick="closeEditor()" style="background: #ff4757; color: white;">Cancel</button>
</div>

<script>
    let questionsList = [
        "Where are you going?", "Where are we going?", "Where are they going?", "Where is he going?", "Where is she going?",
        "Are you going to the bakery?", "Are we going to the bank?", "Are they going to the bookstore?", "Is he going to the hospital?", "Is she going to the park?",
        "How can we get to the park?", "How can I get to the park?", "How can they get to the park?", "How can he get to the park?", "How can she get to the park?",
        "Can we get there by bike?", "Can I get there by bus?", "Can they get there by car?", "Can he get there by MRT?", "Can she get there by taxi?"
    ];

    let p1Hearts = 5; let p2Hearts = 5; let currentPlayer = 1;
    let isPaused = false; let isAnimating = false;

    function initGame() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const items = [...Array(6).fill('❤️'), ...Array(7).fill('💣'), ...Array(7).fill('🚀')];
        const shuffledItems = items.sort(() => Math.random() - 0.5);
        const shuffledQs = [...questionsList].sort(() => Math.random() - 0.5);

        for (let i = 0; i < 20; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="card-inner"><div class="card-front">${shuffledQs[i]}</div><div class="card-back">${shuffledItems[i]}</div></div>`;
            card.onclick = () => handleFlip(card, shuffledItems[i]);
            grid.appendChild(card);
        }
        updateScoreUI();
        updateTurnIndicator();
    }

    function handleFlip(card, type) {
        if (isPaused || isAnimating || card.classList.contains('flipped')) return;
        isAnimating = true; card.classList.add('flipped');
        setTimeout(() => {
            if (type === '❤️') animateHeartGain(card);
            else if (type === '💣') animateLoss(currentPlayer);
            else if (type === '🚀') animateLoss(currentPlayer === 1 ? 2 : 1);
        }, 600);
    }

    function animateHeartGain(card) {
        const icon = card.querySelector('.card-back');
        const rect = icon.getBoundingClientRect();
        const targetZone = document.getElementById(`p${currentPlayer}-zone`).getBoundingClientRect();
        const flyer = document.createElement('div');
        flyer.className = 'flying-item'; flyer.innerHTML = '❤️';
        flyer.style.left = rect.left + 'px'; flyer.style.top = rect.top + 'px';
        document.body.appendChild(flyer);

        setTimeout(() => {
            flyer.style.left = targetZone.left + 35 + 'px';
            flyer.style.top = targetZone.top + 50 + 'px';
            flyer.style.opacity = '0';
        }, 50);

        setTimeout(() => {
            if (currentPlayer === 1) p1Hearts++; else p2Hearts++;
            updateScoreUI();
            document.body.removeChild(flyer);
            endTurn();
        }, 850);
    }

    function animateLoss(playerNum) {
        const zone = document.getElementById(`p${playerNum}-zone`);
        const hearts = zone.getElementsByClassName('heart-score');
        if (hearts.length > 0) {
            const lastHeart = hearts[hearts.length - 1];
            lastHeart.classList.add('shaking');
            setTimeout(() => {
                lastHeart.classList.remove('shaking');
                lastHeart.classList.add('exploding');
                setTimeout(() => {
                    if (playerNum === 1) p1Hearts--; else p2Hearts--;
                    updateScoreUI();
                    if (p1Hearts <= 0 || p2Hearts <= 0) endGame();
                    else endTurn();
                }, 500);
            }, 700);
        } else { endTurn(); }
    }

    function updateScoreUI() {
        document.getElementById('p1-zone').innerHTML = Array(Math.max(0, p1Hearts)).fill('<div class="heart-score">❤️</div>').join('');
        document.getElementById('p2-zone').innerHTML = Array(Math.max(0, p2Hearts)).fill('<div class="heart-score">❤️</div>').join('');
    }

    function updateTurnIndicator() {
        const p1Z = document.getElementById('p1-zone');
        const p2Z = document.getElementById('p2-zone');
        const info = document.getElementById('turn-info');

        if (currentPlayer === 1) {
            p1Z.classList.add('active-p1');
            p2Z.classList.remove('active-p2');
            info.style.boxShadow = `0 0 15px var(--p1-color)`;
            info.innerText = "Player 1's Turn";
        } else {
            p2Z.classList.add('active-p2');
            p1Z.classList.remove('active-p1');
            info.style.boxShadow = `0 0 15px var(--p2-color)`;
            info.innerText = "Player 2's Turn";
        }
    }

    function endTurn() {
        currentPlayer = currentPlayer === 1 ? 2 : 1;
        updateTurnIndicator();
        isAnimating = false;
        if (document.querySelectorAll('.flipped').length === 20) endGame();
    }

    function endGame() {
        const winner = p1Hearts > p2Hearts ? "Player 1" : "Player 2";
        const msgs = ["Congrats", "Awesome", "Excellent"];
        const randMsg = msgs[Math.floor(Math.random() * msgs.length)];
        document.getElementById('winner-msg').innerText = `${randMsg}, ${winner}!`;
        document.getElementById('end-screen').style.display = 'flex';
    }

    function resetGame() {
        p1Hearts = 5; p2Hearts = 5; currentPlayer = 1; isPaused = false; isAnimating = false;
        document.getElementById('end-screen').style.display = 'none';
        initGame();
    }

    function togglePause() { isPaused = !isPaused; document.getElementById('pauseBtn').innerText = isPaused ? "Resume" : "Pause"; }
    function openEditor() { document.getElementById('edit-area').value = questionsList.join('\n'); document.getElementById('editor').style.display = 'flex'; isPaused = true; }
    function closeEditor() { document.getElementById('editor').style.display = 'none'; isPaused = false; }
    function saveEditor() {
        const newQs = document.getElementById('edit-area').value.split('\n').filter(q => q.trim() !== '');
        if (newQs.length !== 20) { alert("Please enter exactly 20 questions!"); return; }
        questionsList = newQs; closeEditor(); resetGame();
    }

    initGame();
</script>

</body>
</html>
